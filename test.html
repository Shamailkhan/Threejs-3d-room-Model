<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Office Model - Step 2</title>
    <style>
        * { margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; }
        canvas { display: block; }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 10px 15px;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <div id="info">
        <h2>Step 2: Room Structure</h2>
        <p>Floor and walls created</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Scene setup (same as Step 1)
        const width = window.innerWidth;
        const height = window.innerHeight;
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);

        const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
        camera.position.set(8, 6, 10);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(width, height);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        document.body.appendChild(renderer.domElement);

        // ===== STEP 2: Create Floor =====
        const floorGeometry = new THREE.PlaneGeometry(12, 12);
        const floorMaterial = new THREE.MeshStandardMaterial({
            color: 0xd4a574,      // Wood color
            roughness: 0.6,
            metalness: 0.1
        });
        const floor = new THREE.Mesh(floorGeometry, floorMaterial);
        floor.rotation.x = -Math.PI / 2; // Rotate to lay flat
        floor.position.y = 0;
        floor.receiveShadow = true;
        scene.add(floor);

        // ===== Create Walls =====
        const wallMaterial = new THREE.MeshStandardMaterial({
            color: 0xf5f5f5,      // Light gray/white
            roughness: 0.8,
            metalness: 0
        });

        // Back Wall
        const backWallGeometry = new THREE.PlaneGeometry(12, 3.5);
        const backWall = new THREE.Mesh(backWallGeometry, wallMaterial);
        backWall.position.set(0, 1.75, -6);
        backWall.receiveShadow = true;
        backWall.castShadow = true;
        scene.add(backWall);

        // Front Wall
        const frontWall = new THREE.Mesh(backWallGeometry, wallMaterial);
        frontWall.position.set(0, 1.75, 6);
        frontWall.rotation.y = Math.PI;
        frontWall.receiveShadow = true;
        frontWall.castShadow = true;
        scene.add(frontWall);

        // Left Wall
        const leftWallGeometry = new THREE.PlaneGeometry(12, 3.5);
        const leftWall = new THREE.Mesh(leftWallGeometry, wallMaterial);
        leftWall.rotation.y = Math.PI / 2;
        leftWall.position.set(-6, 1.75, 0);
        leftWall.receiveShadow = true;
        leftWall.castShadow = true;
        scene.add(leftWall);

        // Right Wall
        const rightWall = new THREE.Mesh(leftWallGeometry, wallMaterial);
        rightWall.rotation.y = -Math.PI / 2;
        rightWall.position.set(6, 1.75, 0);
        rightWall.receiveShadow = true;
        rightWall.castShadow = true;
        scene.add(rightWall);

        // ===== Lighting =====
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(8, 10, 8);
        directionalLight.castShadow = true;
        directionalLight.shadow.mapSize.width = 2048;
        directionalLight.shadow.mapSize.height = 2048;
        scene.add(directionalLight);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }
        animate();

        // Handle window resize
        window.addEventListener('resize', () => {
            const newWidth = window.innerWidth;
            const newHeight = window.innerHeight;
            camera.aspect = newWidth / newHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(newWidth, newHeight);
        });
    </script>
</body>
</html>
